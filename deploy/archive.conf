# Minimal systemd drop-in for deployments that predate the durable archive unit.
# Install at:
#   /etc/systemd/system/sovereign-explorer.service.d/archive.conf
#
# This intentionally changes only archive settings so existing relay and port
# configuration remains untouched during the migration.

[Service]
Environment=ARCHIVE_DIR=/var/lib/sovereign-explorer
Environment=ARCHIVE_BACKFILL_BATCH=64
Environment=REQUIRE_COMPLETE_ARCHIVE=1
