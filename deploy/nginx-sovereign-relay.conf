# Install one adjusted copy on EACH relay in /etc/nginx/conf.d/. Replace
# RELAY_HOSTNAME with that node's unique DNS name before `nginx -t`.
# This endpoint is intentionally reachable only from the explorer ingress host.

limit_req_zone $binary_remote_addr zone=sov_relay_ip:1m     rate=100r/s;
limit_req_zone $server_name        zone=sov_relay_global:1m rate=200r/s;
limit_conn_zone $binary_remote_addr zone=sov_relay_conn:1m;

upstream sovereign_rpc_local {
    server 127.0.0.1:8645 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name RELAY_HOSTNAME;
    location ^~ /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 308 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name RELAY_HOSTNAME;

    ssl_certificate     /etc/letsencrypt/live/RELAY_HOSTNAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/RELAY_HOSTNAME/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SOV_RELAY_TLS:2m;
    server_tokens off;
    client_max_body_size 64k;
    limit_req_status 429;
    limit_conn_status 429;

    location = /rpc {
        # Current explorer ingress: 104.236.244.93. Keep this synchronized if moved.
        allow 104.236.244.93;
        deny all;
        limit_except POST { deny all; }
        limit_req zone=sov_relay_ip burst=100 nodelay;
        limit_req zone=sov_relay_global burst=200 nodelay;
        limit_conn sov_relay_conn 16;

        proxy_pass http://sovereign_rpc_local/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 127.0.0.1;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
    }

    location / { return 404; }
}
