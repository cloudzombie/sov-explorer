# Install as /etc/nginx/conf.d/sovereign-explorer.conf. This file contains http-
# context zones/maps as well as the virtual host, so do not nest it in a server{}.
# Validate with `nginx -t` before reload.

map $http_upgrade $sov_connection_upgrade {
    default upgrade;
    ''      close;
}

limit_req_zone  $binary_remote_addr zone=sov_http_ip:10m       rate=20r/s;
limit_req_zone  $server_name        zone=sov_http_global:1m    rate=500r/s;
limit_req_zone  $binary_remote_addr zone=sov_graphql_ip:10m    rate=2r/s;
limit_req_zone  $server_name        zone=sov_graphql_global:1m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=sov_conn_ip:10m;
limit_conn_zone $server_name        zone=sov_conn_global:1m;

upstream sovereign_explorer {
    server 127.0.0.1:8730 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name sovxus.org www.sovxus.org;
    location ^~ /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 308 https://sovxus.org$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sovxus.org www.sovxus.org;

    ssl_certificate     /etc/letsencrypt/live/sovxus.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sovxus.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SOV_TLS:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server_tokens off;
    client_max_body_size 64k;
    limit_req_status 429;
    limit_conn_status 429;
    gzip on;
    gzip_types application/json text/css application/javascript image/svg+xml;

    # Keep health available to external monitors without letting one client hammer it.
    location = /healthz {
        limit_req zone=sov_http_ip burst=5 nodelay;
        limit_conn sov_conn_ip 5;
        proxy_pass http://sovereign_explorer;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /graphql/ {
        limit_req zone=sov_graphql_ip burst=10 nodelay;
        limit_req zone=sov_graphql_global burst=100 nodelay;
        limit_conn sov_conn_ip 20;
        limit_conn sov_conn_global 1000;
        proxy_pass http://sovereign_explorer;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location ^~ /ws/ {
        limit_conn sov_conn_ip 5;
        limit_conn sov_conn_global 1000;
        proxy_pass http://sovereign_explorer;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $sov_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_connect_timeout 3s;
        proxy_read_timeout 70s;
        proxy_send_timeout 15s;
    }

    location / {
        limit_req zone=sov_http_ip burst=40 nodelay;
        limit_req zone=sov_http_global burst=1000 nodelay;
        limit_conn sov_conn_ip 20;
        limit_conn sov_conn_global 1000;
        proxy_pass http://sovereign_explorer;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        # Deliberately overwrite, rather than append to, untrusted forwarding data.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }
}
